services:
    postgres:
        image: postgres:16
        container_name: pkb-postgres
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-pkb}
            POSTGRES_USER: ${POSTGRES_USER:-pkb}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pkb}
        ports:
            - "5432:5432"
        volumes:
            - ./data/postgres:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pkb} -d ${POSTGRES_DB:-pkb}"]
            interval: 10s
            timeout: 5s
            retries: 5

    qdrant:
        image: qdrant/qdrant:v1.11.3
        container_name: pkb-qdrant
        ports:
            - "6333:6333"
            - "6334:6334"
        volumes:
            - ./data/qdrant:/qdrant/storage

    opensearch:
        image: opensearchproject/opensearch:2.15.0
        container_name: pkb-opensearch
        environment:
            discovery.type: single-node
            plugins.security.disabled: "true"
            OPENSEARCH_INITIAL_ADMIN_PASSWORD: "PkbLocalOnly123!"
            OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports:
            - "9200:9200"
            - "9600:9600"
        volumes:
            - ./data/opensearch:/usr/share/opensearch/data
        healthcheck:
            test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
            interval: 15s
            timeout: 10s
            retries: 10
